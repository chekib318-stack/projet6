workflows:

  android-debug:
    name: ExamGuard APK Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      java: 17
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/android/.gradle
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Get dependencies
        script: flutter pub get

      - name: Patch flutter_blue_plus_android
        script: |
          PLUGIN=$(find $HOME/.pub-cache -name "build.gradle" \
            -path "*flutter_blue_plus_android*" 2>/dev/null | head -1)
          if [ -n "$PLUGIN" ]; then
            python3 -c "
          import re
          with open('$PLUGIN') as f: c = f.read()
          c = re.sub(r'flutter\.compileSdkVersion', '35', c)
          c = re.sub(r'flutter\.targetSdkVersion',  '35', c)
          c = re.sub(r'flutter\.minSdkVersion',      '21', c)
          with open('$PLUGIN', 'w') as f: f.write(c)
          print('Patched:', '$PLUGIN')
          "
          else
            echo 'Plugin not found - skipping patch'
          fi

      - name: Build APK debug
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - dsi@education.tn
        notify:
          success: true
          failure: true

  android-release:
    name: ExamGuard APK Release
    max_build_duration: 35
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      java: 17
      android_signing:
        - examguard_keystore
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/android/.gradle
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Patch flutter_blue_plus_android
        script: |
          PLUGIN=$(find $HOME/.pub-cache -name "build.gradle" \
            -path "*flutter_blue_plus_android*" 2>/dev/null | head -1)
          if [ -n "$PLUGIN" ]; then
            python3 -c "
          import re
          with open('$PLUGIN') as f: c = f.read()
          c = re.sub(r'flutter\.compileSdkVersion', '35', c)
          c = re.sub(r'flutter\.targetSdkVersion',  '35', c)
          c = re.sub(r'flutter\.minSdkVersion',      '21', c)
          with open('$PLUGIN', 'w') as f: f.write(c)
          "
          fi

      - name: Build APK release
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=build/debug-info

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - dsi@education.tn
        notify:
          success: true
          failure: true
